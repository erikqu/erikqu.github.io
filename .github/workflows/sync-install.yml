name: Sync install.sh

# Keeps /install on the site in sync with the canonical install.sh in the
# workbench-cli repo, so the curl one-liner (https://ehq.so/install) is served
# here without maintaining a second copy by hand. Run it manually any time via
# the "Run workflow" button.
on:
  schedule:
    - cron: "0 * * * *" # hourly
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest install.sh
        run: |
          curl -fsSL \
            https://raw.githubusercontent.com/erikqu/workbench-cli/main/install.sh \
            -o install

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add install
          if git diff --cached --quiet; then
            echo "install is already up to date."
          else
            git commit -m "Sync install.sh from workbench-cli"
            git push
          fi
